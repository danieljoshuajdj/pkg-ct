name: Bug report
description: Report a reproducible pkg-ct problem.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Include the exact command and a minimal fixture if possible.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: pkg-ct version
      placeholder: "0.6.0"
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "node --version"
  - type: textarea
    id: output
    attributes:
      label: Output
      render: text
